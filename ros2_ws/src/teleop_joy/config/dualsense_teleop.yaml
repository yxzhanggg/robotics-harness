joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.08
    autorepeat_rate: 20.0
    coalesce_interval_ms: 1

teleop_twist_joy_node:
  ros__parameters:
    require_enable_button: true
    enable_button: 4
    enable_turbo_button: 5

    axis_linear:
      x: 1
    scale_linear:
      x: 0.25
    scale_linear_turbo:
      x: 0.45

    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 0.8
    scale_angular_turbo:
      yaw: 1.2

    publish_stamped_twist: false
    frame: teleop_joy
