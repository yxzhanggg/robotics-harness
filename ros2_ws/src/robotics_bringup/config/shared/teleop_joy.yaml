joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.08
    autorepeat_rate: 20.0
    coalesce_interval_ms: 1

multi_robot_teleop:
  ros__parameters:
    robots:
      - atlas
      - vector
    selected_robot: atlas
    joy_topic: /joy
    cmd_vel_topic: cmd_vel
    estop_topic: teleop_estop
    status_topic: ~/status

    require_enable_button: true
    enable_button: 4
    turbo_button: 5
    estop_button: 2
    clear_estop_button: 3

    axis_linear_x: 1
    axis_angular_z: 3
    select_buttons:
      atlas: 0
      vector: 1

    deadzone: 0.08
    publish_rate_hz: 20.0
    stale_joy_timeout_sec: 0.35

    scale_linear_x: 0.25
    scale_angular_z: 0.8
    scale_linear_x_turbo: 0.45
    scale_angular_z_turbo: 1.2
